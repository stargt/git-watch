repos:
  - ~/work/api-server
  - ~/work/web-app
  - ~/work/cli-tool
  - ~/work/docs

watch:
  debounce_ms: 200
  reconcile_interval_sec: 60
  fetch_interval_sec: 300

git:
  command_timeout_sec: 3

ui:
  width: 30
  color: true
  show_clean: true
  blank_line_between_repos: true
  compact_threshold: 40
